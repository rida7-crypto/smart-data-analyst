<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Data Analyst — Workspace</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://cdn.plot.ly/plotly-2.24.1.min.js"></script>
</head>
<body>

    <div class="app-container">

        <aside class="sidebar" id="appSidebar">
            <div class="logo-section">
                <h2>SmartData<span>Analyst</span></h2>
                <div class="utility-controls">
                    <button class="icon-btn" id="themeToggle" title="Toggle Mode">
                        <i data-lucide="sun"></i>
                    </button>
                    <button class="icon-btn" id="collapseSidebarBtn" title="Hide Sidebar">
                        <i data-lucide="chevron-left"></i>
                    </button>
                </div>
            </div>

            <div class="upload-box" id="dropZone">
                <i data-lucide="cloud-lightning" size="28"></i>
                <span>Drop your dataset here</span>
                <small>Supports CSV, XLSX, JSON</small>
                <input type="file" id="hiddenFileInput" style="display: none;" accept=".csv,.xlsx,.json">
            </div>

            <div class="sidebar-scroll-wrapper">
                <div>
                    <div class="panel-title">Dataset Profile</div>
                    <div id="metricsPanel">
                        <div class="metric-card"><span class="metric-label">Dimensions</span><span class="metric-value" id="metaDim">- × -</span></div>
                        <div class="metric-card"><span class="metric-label">Duplicate Rows</span><span class="metric-value" id="metaDup">0</span></div>
                        <div class="metric-card"><span class="metric-label">Null Cells</span><span class="metric-value" id="metaNull">0</span></div>
                    </div>
                </div>

                <div>
                    <div class="panel-title">Detected Target Columns</div>
                    <div class="columns-container" id="columnsWrapper">
                        <span class="placeholder-text">No active ledger parsed yet.</span>
                    </div>
                </div>
            </div>
        </aside>

        <main class="main-workspace">
            <button class="icon-btn sidebar-trigger" id="expandSidebarBtn" style="display: none;" title="Show Sidebar">
                <i data-lucide="menu"></i>
            </button>

            <div class="output-viewport" id="chatViewport">
                <div class="chat-row agent-mode">
                    <div class="bubble">
                        Welcome back. Upload a raw data pipeline to initialize the secure operational evaluation loop.
                    </div>
                </div>
            </div>

            <div class="input-console-wrapper">
                <div class="input-box-container">
                    <i data-lucide="terminal" size="18" style="color: var(--text-muted)"></i>
                    <input type="text" id="userQueryInput" placeholder="Ask your agent to clean data, extract statistics, or generate charts...">
                    <button id="sendQueryBtn" disabled>
                        <span>Run Query</span>
                        <i data-lucide="play" size="14"></i>
                    </button>
                </div>
            </div>
        </main>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
